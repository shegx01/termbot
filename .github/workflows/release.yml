name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - patch
          - rtc

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit
        run: cargo audit

  build:
    name: Build (${{ matrix.target }})
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure aarch64 cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"

      - name: Build
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$BUILD_TARGET"

      - name: Rename binary
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: mv "target/${BUILD_TARGET}/release/terminus" "terminus-${BUILD_TARGET}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: terminus-${{ matrix.target }}
          path: terminus-${{ matrix.target }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums and release notes
        env:
          COMMIT_SHA: ${{ github.sha }}
        run: |
          cd artifacts
          sha256sum terminus-* > checksums.txt
          {
            echo "Automated release from commit ${COMMIT_SHA}"
            echo ""
            echo "## SHA-256 Checksums"
            echo '```'
            cat checksums.txt
            echo '```'
          } > ../release-notes.md

      - name: Set build metadata
        env:
          RELEASE_CHANNEL: ${{ github.event.inputs.channel || 'stable' }}
        run: |
          case "$RELEASE_CHANNEL" in
            stable | patch | rtc) ;;
            *)
              echo "Invalid release channel: $RELEASE_CHANNEL" >&2
              exit 1
              ;;
          esac

          BUILD_DATE="$(date -u +'%Y_%m_%d')"
          BUILD_TIME="$(date -u +'%H:%M')"
          TAG_TIME="$(date -u +'%H%M')"

          echo "RELEASE_CHANNEL=$RELEASE_CHANNEL" >> "$GITHUB_ENV"
          echo "TAG=${BUILD_DATE}_${TAG_TIME}_${RELEASE_CHANNEL}" >> "$GITHUB_ENV"
          echo "BUILD_NAME=${BUILD_DATE}_${BUILD_TIME}_${RELEASE_CHANNEL}" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG }}
          name: "Build ${{ env.BUILD_NAME }}"
          body_path: release-notes.md
          files: |
            artifacts/terminus-*
          fail_on_unmatched_files: true

      - name: Move latest tag
        run: |
          git tag --force latest "$GITHUB_SHA"
          git push --force origin refs/tags/latest

      - name: Update latest release alias
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest
          body: |
            Alias for Build ${{ env.BUILD_NAME }}.

            Timestamped release: ${{ env.TAG }}
          files: |
            artifacts/terminus-*
          fail_on_unmatched_files: true
          overwrite_files: true
          make_latest: false
